name: Ride OS v3 stability patch
on:
  push:
    branches: [feat/ride-os-v3-premium]
    paths: [.github/workflows/ride-os-v3-stability-patch.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ride-os-v3-premium
      - name: Apply focused stability fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('src/ride-os-v3.js')
          text=path.read_text()
          replacements=[
            ("const $=(selector,root=document)=>root.querySelector(selector);\nconst $$=(selector,root=document)=>[...root.querySelectorAll(selector)];", "const $=(selector,root=document)=>root?.querySelector?.(selector)||null;\nconst $$=(selector,root=document)=>root?.querySelectorAll?[...root.querySelectorAll(selector)]:[];"),
            ("function openAtlas(options={}){const nav=$('#adventureNav');if(!$('#adventureOverlay')){if(!nav)return toast('Adventure Map is still loading.');$('#rideDashOverlay')?.remove();nav.click()}const reveal=()=>{const overlay=$('#adventureOverlay');if(!overlay)return setTimeout(reveal,120);enhanceAdventure(overlay);if(options.preferTopo){saveMapSetting('style','topo');selectPremiumBase('topo')}$('#advRoutesSheet')?.classList.remove('open');$('#advLayersSheet')?.classList.add('open');$$('.advBottomBar [data-sheet]').forEach(button=>button.classList.toggle('active',button.dataset.sheet==='advLayersSheet'))};setTimeout(reveal,180)}", "function openAtlas(options={}){const nav=$('#adventureNav');if(!$('#adventureOverlay')){if(!nav)return toast('Adventure Map is still loading.');$('#rideDashOverlay')?.remove();nav.click()}const reveal=()=>{const overlay=$('#adventureOverlay');if(!overlay)return setTimeout(reveal,120);enhanceAdventure(overlay);if(options.preferTopo){saveMapSetting('style','topo');selectPremiumBase('topo')}const layerButton=$('.advBottomBar [data-sheet=\"advLayersSheet\"]',overlay);if(layerButton)layerButton.click();else{$$('.advSheet',overlay).forEach(sheet=>sheet.classList.remove('open'));$('#advLayersSheet',overlay)?.classList.add('open')}};setTimeout(reveal,180)}"),
            ("routesSheet.appendChild(panel);tab.onclick=()=>activateScoutTab(overlay);initializeScoutControls(panel);bindAdventure(overlay)", "routesSheet.appendChild(panel);tab.onclick=()=>activateScoutTab(overlay);$$('[data-route-tab]',routesSheet).forEach(button=>button.addEventListener('click',()=>{panel.hidden=true;tab.classList.remove('active')}));initializeScoutControls(panel);bindAdventure(overlay)"),
            ("function scanDOM(){const dash=$('#rideDashOverlay');if(dash)enhanceRideDashboard(dash);const adventure=$('#adventureOverlay');if(adventure)enhanceAdventure(adventure)}\nfunction boot(){trailPoints=loadJSON(TRAIL_KEY,[]);lastTrailPoint=trailPoints.at(-1)||null;patchLeaflet();setInterval(()=>{patchLeaflet();if(window.MotoAdventureMap&&!adventureMap){adventureMap=window.MotoAdventureMap;registerPremiumLayers();applyMapSettings()}},250);", "function watchLeafletScript(){const script=$('script[data-leaflet]');if(!script||script.dataset.rideV3Watch)return;script.dataset.rideV3Watch='1';script.addEventListener('load',()=>patchLeaflet(),{once:true})}\nfunction scanDOM(){watchLeafletScript();const dash=$('#rideDashOverlay');if(dash)enhanceRideDashboard(dash);const adventure=$('#adventureOverlay');if(adventure)enhanceAdventure(adventure)}\nfunction boot(){trailPoints=loadJSON(TRAIL_KEY,[]);lastTrailPoint=trailPoints.at(-1)||null;patchLeaflet();setInterval(()=>{watchLeafletScript();patchLeaflet();if(window.MotoAdventureMap&&!adventureMap){adventureMap=window.MotoAdventureMap;registerPremiumLayers();applyMapSettings()}},100);"),
            ("new MutationObserver(scanDOM).observe(document.body,{childList:true,subtree:true});", "new MutationObserver(mutations=>{if(mutations.some(mutation=>[...mutation.addedNodes].some(node=>node.nodeType===1&&(node.matches?.('#rideDashOverlay,#adventureOverlay,script[data-leaflet]')||node.querySelector?.('#rideDashOverlay,#adventureOverlay,script[data-leaflet]')))))scanDOM()}).observe(document.body,{childList:true,subtree:false});")
          ]
          for old,new in replacements:
              count=text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old[:90]}')
              text=text.replace(old,new)
          path.write_text(text)
          PY
          node --check src/ride-os-v3.js
      - name: Commit stability fixes
        run: |
          git config user.name "Moto Mission Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/ride-os-v3.js
          git commit -m "Stabilize Ride OS v3 observers and map capture"
          git push origin HEAD:feat/ride-os-v3-premium
