name: Bug
about: Report a reproducible defect
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Defect summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and evidence
      description: Include logs, screenshots, platform, browser, device, and commit when available.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Fix acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Safety, data-loss, authentication, or deployment risk
    validations:
      required: true
