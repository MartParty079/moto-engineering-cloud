name: Dev audit

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Check JavaScript syntax and common mistakes
        shell: bash
        run: |
          set -o pipefail
          npm run check:syntax 2>&1 | tee audit.log
      - name: Audit buttons, routes, and interaction wiring
        shell: bash
        run: |
          set -o pipefail
          npm run check:interactions 2>&1 | tee interaction-audit.log
      - name: Audit recording architecture
        shell: bash
        run: |
          set -o pipefail
          node scripts/recording-static-audit.mjs 2>&1 | tee recording-static-audit.log
      - name: Build production bundle
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload audit output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-audit-output
          path: |
            audit.log
            interaction-audit.log
            recording-static-audit.log
            recording-static-audit.json
            recording-static-audit.md
            build.log
          if-no-files-found: ignore
          retention-days: 7

  browser-evidence:
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install app dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browser runners
        run: |
          npm install --no-save --package-lock=false playwright@1.54.2
          npx playwright install --with-deps chromium webkit
      - name: Build production bundle
        run: npm run build
      - name: Start production preview
        shell: bash
        run: |
          npm run preview -- --host 127.0.0.1 > vite-preview.log 2>&1 &
          echo $! > vite-preview.pid
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat vite-preview.log
          exit 1
      - name: Stress recording and capture Chromium proof
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_BROWSER: chromium
        run: node scripts/e2e-proof.mjs
      - name: Stress recording and capture WebKit proof
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_BROWSER: webkit
        run: node scripts/e2e-proof.mjs
      - name: Upload screenshot and diagnostic proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-mission-browser-proof
          path: |
            test-results/proof/
            vite-preview.log
          if-no-files-found: error
          retention-days: 14