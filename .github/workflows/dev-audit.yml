name: Dev audit

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Check JavaScript syntax and common mistakes
        shell: bash
        run: |
          set -o pipefail
          npm run check:syntax 2>&1 | tee audit.log
      - name: Build production bundle
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload audit output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-audit-output
          path: |
            audit.log
            build.log
          if-no-files-found: ignore
          retention-days: 3
