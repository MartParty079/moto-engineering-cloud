name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - release/weekend-iphone-readiness
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository and history
        uses: gitleaks/gitleaks-action@v2
